<h2 mat-dialog-title>{{ isEdit ? 'Edit Company' : 'New Company' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" id="companyForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline">
      <mat-label>Company Name</mat-label>
      <input matInput formControlName="name" />
      @if (form.controls.name.hasError('required')) {
        <mat-error>Required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Industry</mat-label>
      <input matInput formControlName="industry" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Website</mat-label>
      <input matInput formControlName="website" placeholder="https://..." />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Phone</mat-label>
      <input matInput formControlName="phone" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Address</mat-label>
      <input matInput formControlName="address" />
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input matInput formControlName="city" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-row__short">
        <mat-label>State</mat-label>
        <input matInput formControlName="state" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-row__short">
        <mat-label>ZIP</mat-label>
        <input matInput formControlName="zip" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button
    mat-flat-button
    color="primary"
    type="submit"
    form="companyForm"
    [disabled]="saving()"
  >
    @if (saving()) {
      <mat-spinner diameter="18"></mat-spinner>
    } @else {
      {{ isEdit ? 'Save' : 'Create' }}
    }
  </button>
</mat-dialog-actions>
