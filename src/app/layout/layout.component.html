<div class="layout" [class.layout--collapsed]="sidebarCollapsed()">
  <div
    class="sr-backdrop"
    [class.sr-backdrop--visible]="!sidebarCollapsed()"
    (click)="toggleSidebar()"
  ></div>
  <app-sidebar [collapsed]="sidebarCollapsed()" (toggle)="toggleSidebar()" />
  <div class="layout__main">
    <app-toolbar (menuToggle)="toggleSidebar()" />
    <main class="layout__content">
      <router-outlet />
    </main>
  </div>
</div>
