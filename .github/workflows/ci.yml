name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ vars.RUN_E2E == 'true' }}

    steps:
      - name: Checkout Angular repo
        uses: actions/checkout@v4

      - name: Checkout .NET API repo
        uses: actions/checkout@v4
        with:
          repository: rvnminers-A-and-N/sunroom-crm-dotnet
          path: dotnet-api

      - name: Start API via docker-compose
        working-directory: dotnet-api
        env:
          SA_PASSWORD: SunroomCrmCI2026!
        run: docker compose up -d --build --wait

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5236/health; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          docker compose -f dotnet-api/docker-compose.yml logs
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop API containers
        if: always()
        working-directory: dotnet-api
        run: docker compose down -v
